<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Temporary illustrated placeholder of a plant nursery scene">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A30"/>
      <stop offset="55%" stop-color="#152D26"/>
      <stop offset="100%" stop-color="#0F211C"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CC8B52" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#CC8B52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6FA57C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6FA57C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F5A3E"/>
      <stop offset="100%" stop-color="#1E3F2B"/>
    </linearGradient>
    <linearGradient id="leafMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F7A50"/>
      <stop offset="100%" stop-color="#2A5638"/>
    </linearGradient>
    <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B5713D"/>
      <stop offset="100%" stop-color="#8C5429"/>
    </linearGradient>
    <path id="leaf" d="M100 300 C 20 230 20 100 100 10 C 180 100 180 230 100 300 Z"/>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgGrad)"/>

  <!-- soft ambient light glows -->
  <circle cx="1250" cy="180" r="420" fill="url(#glowGold)"/>
  <circle cx="250" cy="120" r="360" fill="url(#glowGreen)"/>
  <circle cx="800" cy="940" r="520" fill="url(#glowGreen)" opacity="0.5"/>

  <!-- distant scattered leaves -->
  <g opacity="0.35" fill="url(#leafMid)">
    <use href="#leaf" transform="translate(150,150) rotate(20) scale(0.6)"/>
    <use href="#leaf" transform="translate(1400,220) rotate(-30) scale(0.7)"/>
    <use href="#leaf" transform="translate(700,80) rotate(60) scale(0.5)"/>
    <use href="#leaf" transform="translate(1080,430) rotate(-10) scale(0.45)"/>
  </g>

  <!-- foreground leaf cluster, bottom-left -->
  <g fill="url(#leafDark)">
    <use href="#leaf" transform="translate(-60,760) rotate(15) scale(1.6)"/>
    <use href="#leaf" transform="translate(80,820) rotate(-25) scale(1.3)"/>
  </g>
  <g fill="url(#leafMid)">
    <use href="#leaf" transform="translate(20,880) rotate(-5) scale(1.1)"/>
  </g>

  <!-- foreground leaf cluster, bottom-right -->
  <g fill="url(#leafDark)">
    <use href="#leaf" transform="translate(1420,780) rotate(-18) scale(1.5)"/>
  </g>
  <g fill="url(#leafMid)">
    <use href="#leaf" transform="translate(1300,850) rotate(30) scale(1.2)"/>
  </g>

  <!-- terracotta pots -->
  <g>
    <path d="M700 980 L 760 980 L 745 1080 L 715 1080 Z" fill="url(#potGrad)"/>
    <ellipse cx="730" cy="980" rx="30" ry="8" fill="#C99A6B"/>
    <path d="M900 960 L 970 960 L 952 1080 L 918 1080 Z" fill="url(#potGrad)"/>
    <ellipse cx="935" cy="960" rx="35" ry="9" fill="#C99A6B"/>
  </g>

  <!-- small leaves near pots -->
  <g fill="url(#leafMid)" opacity="0.9">
    <use href="#leaf" transform="translate(680,900) rotate(10) scale(0.7)"/>
    <use href="#leaf" transform="translate(920,870) rotate(-15) scale(0.8)"/>
  </g>
</svg>
